name: Aurum
options:
  bundleIdPrefix: com.fabricio.aurum
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_PREVIEWS: YES
targets:
  Aurum:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    info:
      path: Sources/App/Info.plist
      properties:
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: Aurum
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fabricio.aurum
        PRODUCT_NAME: Aurum
        GENERATE_INFOPLIST_FILE: NO
schemes:
  Aurum:
    build:
      targets:
        Aurum: all
    run:
      config: Debug
